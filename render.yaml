services:
  - type: web
    name: coin-collector-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install -g pnpm@11.5.0 && pnpm install --frozen-lockfile && pnpm --filter api exec prisma generate && pnpm --filter @coin-collector/shared build && pnpm --filter api build
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
