services:
  - type: web
    name: coin-collector-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
