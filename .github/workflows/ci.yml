name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coin_collector_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/coin_collector_test
      JWT_SECRET: ci-test-secret-not-for-prod
      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: |
          pnpm --filter @coin-collector/shared typecheck
          pnpm --filter api exec prisma generate
          pnpm --filter api typecheck
          pnpm --filter web typecheck

      - name: Apply migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Seed templates
        run: pnpm --filter api exec prisma db seed

      - name: Unit tests
        run: pnpm --filter api test

      - name: E2E tests
        run: pnpm --filter api test:e2e
